<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">GrowthForge AWS architecture</title>
  <desc id="desc">An AWS-native revenue experimentation architecture connecting an MVP to event ingestion, an S3 analytics lake, AppConfig flags, Athena analysis, Amazon Bedrock insight, CloudWatch reporting, and Kiro-ready tasks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080b10"/>
      <stop offset="1" stop-color="#101620"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff9900"/>
      <stop offset="1" stop-color="#ffc266"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0l12 6-12 6z" fill="#ffad33"/>
    </marker>
    <marker id="arrowMuted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0l12 6-12 6z" fill="#697586"/>
    </marker>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.025"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" rx="30" fill="url(#bg)"/>
  <rect width="1600" height="900" rx="30" fill="url(#grid)"/>
  <rect x="1" y="1" width="1598" height="898" rx="29" fill="none" stroke="#ffffff" stroke-opacity="0.1"/>

