    <text y="42" fill="#f7f8fa" font-size="34" font-weight="750">From product events to a reversible growth decision</text>
    <text y="73" fill="#929cab" font-size="15">Serverless ingestion, durable evidence, safe configuration, bounded AI, and implementation-ready output.</text>
  </g>

