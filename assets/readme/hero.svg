<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="640" viewBox="0 0 1600 640" role="img" aria-labelledby="title desc">
  <title id="title">GrowthForge AWS hero</title>
  <desc id="desc">A dark product banner showing a revenue learning loop from product events to evidence, experiments, insight, and Kiro-ready tasks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080a0f"/>
      <stop offset="0.52" stop-color="#0d1119"/>
      <stop offset="1" stop-color="#0a0c11"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff9900"/>
      <stop offset="1" stop-color="#ffc266"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.08" r="0.75">
      <stop offset="0" stop-color="#ff9900" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#ff9900" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#ff9900" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0V54" fill="none" stroke="#ffffff" stroke-opacity="0.035"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="640" rx="34" fill="url(#bg)"/>
  <rect width="1600" height="640" rx="34" fill="url(#glow)"/>
  <rect width="1600" height="640" rx="34" fill="url(#grid)"/>
  <rect x="1" y="1" width="1598" height="638" rx="33" fill="none" stroke="#ffffff" stroke-opacity="0.1"/>

  <g transform="translate(76 66)">
    <rect width="42" height="42" rx="12" fill="#ff9900" fill-opacity="0.12" stroke="#ff9900" stroke-opacity="0.48"/>
    <path d="M28 13a12 12 0 1 1-12-2" fill="none" stroke="#ffb84d" stroke-width="3" stroke-linecap="round"/>
    <text x="58" y="29" fill="#f7f8fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="750">GrowthForge <tspan fill="#ffad33">AWS</tspan></text>
  </g>

  <g transform="translate(76 154)">
    <text fill="#ffb84d" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" letter-spacing="2.6">AGENTIC REVENUE EXPERIMENTATION</text>
    <text y="78" fill="#f7f8fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="64" font-weight="760" letter-spacing="-2.8">Turn a deployed MVP into</text>
    <text y="151" fill="url(#orange)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="64" font-weight="760" letter-spacing="-2.8">a revenue learning system.</text>
    <text y="205" fill="#b4bdca" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21">Trusted signals. Reversible experiments. Grounded insights. Build-ready tasks.</text>
  </g>

  <g transform="translate(76 431)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700">
    <g>
      <rect width="185" height="42" rx="21" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="92.5" y="26" text-anchor="middle" fill="#d5dae2">Revenue Learning Score</text>
    </g>
    <g transform="translate(199)">
      <rect width="133" height="42" rx="21" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="66.5" y="26" text-anchor="middle" fill="#d5dae2">AWS-native</text>
    </g>
    <g transform="translate(346)">
      <rect width="159" height="42" rx="21" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="79.5" y="26" text-anchor="middle" fill="#d5dae2">Bedrock-grounded</text>
    </g>
    <g transform="translate(519)">
      <rect width="174" height="42" rx="21" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="87" y="26" text-anchor="middle" fill="#d5dae2">AppConfig rollout</text>
    </g>
    <g transform="translate(707)">
      <rect width="158" height="42" rx="21" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="79" y="26" text-anchor="middle" fill="#d5dae2">Kiro-ready tasks</text>
    </g>
  </g>

  <g transform="translate(980 98)" filter="url(#shadow)">
    <rect width="526" height="440" rx="26" fill="#141a24" fill-opacity="0.95" stroke="#ff9900" stroke-opacity="0.3"/>
    <text x="34" y="45" fill="#99a4b4" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="800" letter-spacing="1.8">DECISION LOOP</text>
    <text x="34" y="82" fill="#f7f8fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="25" font-weight="720">Evidence becomes action</text>

    <g transform="translate(34 118)" font-family="Inter,Segoe UI,Arial,sans-serif">
      <g>
        <rect width="214" height="70" rx="14" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.1"/>
        <circle cx="35" cy="35" r="16" fill="#ff9900" fill-opacity="0.13" stroke="#ff9900" stroke-opacity="0.5"/>
        <text x="35" y="40" text-anchor="middle" fill="#ffb84d" font-size="13" font-weight="800">01</text>
        <text x="64" y="31" fill="#f0f2f6" font-size="14" font-weight="700">Product signals</text>
        <text x="64" y="50" fill="#8f99a8" font-size="11">Versioned, validated events</text>
      </g>
      <g transform="translate(238)">
        <rect width="214" height="70" rx="14" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.1"/>
        <circle cx="35" cy="35" r="16" fill="#ff9900" fill-opacity="0.13" stroke="#ff9900" stroke-opacity="0.5"/>
        <text x="35" y="40" text-anchor="middle" fill="#ffb84d" font-size="13" font-weight="800">02</text>
        <text x="64" y="31" fill="#f0f2f6" font-size="14" font-weight="700">Funnel evidence</text>
        <text x="64" y="50" fill="#8f99a8" font-size="11">Constraint and guardrails</text>
      </g>
      <g transform="translate(0 92)">
        <rect width="214" height="70" rx="14" fill="#ff9900" fill-opacity="0.07" stroke="#ff9900" stroke-opacity="0.32"/>
        <circle cx="35" cy="35" r="16" fill="#ff9900" fill-opacity="0.18" stroke="#ff9900" stroke-opacity="0.65"/>
        <text x="35" y="40" text-anchor="middle" fill="#ffc266" font-size="13" font-weight="800">03</text>
        <text x="64" y="31" fill="#f8f9fb" font-size="14" font-weight="700">Safe experiment</text>
        <text x="64" y="50" fill="#aab2bf" font-size="11">Assign, expose, roll back</text>
      </g>
      <g transform="translate(238 92)">
        <rect width="214" height="70" rx="14" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.1"/>
        <circle cx="35" cy="35" r="16" fill="#ff9900" fill-opacity="0.13" stroke="#ff9900" stroke-opacity="0.5"/>
        <text x="35" y="40" text-anchor="middle" fill="#ffb84d" font-size="13" font-weight="800">04</text>
        <text x="64" y="31" fill="#f0f2f6" font-size="14" font-weight="700">Grounded insight</text>
        <text x="64" y="50" fill="#8f99a8" font-size="11">Aggregates only</text>
      </g>
    </g>

    <g transform="translate(34 310)">
      <rect width="452" height="94" rx="17" fill="#0d121a" stroke="#ffffff" stroke-opacity="0.09"/>
      <text x="22" y="31" fill="#63d9a6" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="1.4">NEXT OUTPUT</text>
      <text x="22" y="60" fill="#f7f8fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="720">requirements.md  /  design.md  /  tasks.md</text>
      <text x="22" y="80" fill="#8f99a8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Traceable from business goal to implementation</text>
    </g>
  </g>

  <text x="76" y="574" fill="#737e8e" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13">Prompt package and static demo - no official AWS logos or brand assets</text>
</svg>
